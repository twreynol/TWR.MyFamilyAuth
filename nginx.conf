include /etc/nginx/mime.types;

# Add WebAssembly MIME type (not in older nginx default sets)
types {
    application/wasm wasm;
}

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached so new deployments load immediately
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
