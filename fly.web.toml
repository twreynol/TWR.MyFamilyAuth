app            = 'myfamilyauth-web-v2'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.web'

  [build.args]
    APPSETTINGS_FILE = 'appsettings.ProductionV2.json'

[http_service]
  internal_port        = 80
  force_https          = true
  auto_stop_machines   = 'stop'
  auto_start_machines  = true
  min_machines_running = 0

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
