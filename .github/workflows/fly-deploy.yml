name: Deploy to Fly.io (master)

on:
  push:
    branches:
      - master   # deploy ONLY when master changes

jobs:
  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    concurrency: fly-deploy-api

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set build version
        run: echo "BUILD_VERSION=1.$(date +%y%m%d).${{ github.run_number }}" >> $GITHUB_ENV

      # Pull .NET base images with retry logic to avoid MCR rate-limit issues
      # on shared GitHub Actions runner IPs.
      - name: Pull .NET base images (with MCR rate-limit retry)
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i: pulling .NET 10 base images..."
            docker pull mcr.microsoft.com/dotnet/sdk:10.0 && \
            docker pull mcr.microsoft.com/dotnet/aspnet:10.0 && \
            echo "✓ Images pulled successfully" && break
            echo "Pull failed (likely MCR rate limit). Waiting 90s before retry..."
            sleep 90
          done
          docker tag mcr.microsoft.com/dotnet/sdk:10.0    dotnet-sdk:local
          docker tag mcr.microsoft.com/dotnet/aspnet:10.0 dotnet-aspnet:local

      - name: Deploy API to Fly.io
        run: |
          flyctl deploy --local-only \
            --config fly.api.toml \
            --build-arg SDK_IMAGE=dotnet-sdk:local \
            --build-arg ASPNET_IMAGE=dotnet-aspnet:local \
            --build-arg BUILD_VERSION=${{ env.BUILD_VERSION }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web to Fly.io
    runs-on: ubuntu-latest
    concurrency: fly-deploy-web
    needs: deploy-api   # deploy API first so the web has a healthy backend

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set build version
        run: echo "BUILD_VERSION=1.$(date +%y%m%d).${{ github.run_number }}" >> $GITHUB_ENV

      - name: Pull .NET base images (with MCR rate-limit retry)
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i: pulling .NET 10 base images..."
            docker pull mcr.microsoft.com/dotnet/sdk:10.0 && \
            echo "✓ Images pulled successfully" && break
            echo "Pull failed (likely MCR rate limit). Waiting 90s before retry..."
            sleep 90
          done
          docker tag mcr.microsoft.com/dotnet/sdk:10.0 dotnet-sdk:local

      - name: Deploy Web to Fly.io
        run: |
          flyctl deploy --local-only \
            --config fly.web.toml \
            --build-arg SDK_IMAGE=dotnet-sdk:local \
            --build-arg APPSETTINGS_FILE=appsettings.ProductionV2.json \
            --build-arg BUILD_VERSION=${{ env.BUILD_VERSION }} \
            --build-arg GH_PACKAGES_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
